# Casos de regressão — comportamentos que NÃO podem quebrar.
# Universais: não assumem stack. Não executado automaticamente pela CLI;
# serve de contrato para o agente e para revisão humana. Adicione um caso
# a cada bug corrigido.

version: 1
cases:
  - id: example-no-data-leak
    title: "Acesso restrito ao escopo do solicitante"
    given: "Ator autenticado com escopo limitado"
    when: "Solicita um recurso fora do seu escopo"
    then: "O acesso é negado; nenhum dado de outro escopo é retornado"
    severity: critical

  - id: example-idempotent-operation
    title: "Operação sensível não duplica efeito"
    given: "Uma operação já processada (mesma chave idempotente)"
    when: "A mesma operação é recebida novamente"
    then: "O efeito não é aplicado de novo; resposta previsível"
    severity: high
